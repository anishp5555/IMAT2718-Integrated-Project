{% extends 'base.html' %}
{% block content %}
<h1 style="margin-bottom:20px;">Welcome to DMU Computing College</h1>
<p style="margin-bottom:30px;">Explore our courses and register for the one that suits you.</p>
<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;">
    {% for course in courses %}
    <div class="card">
        <h3>{{ course['name'] }}</h3>
        <p style="margin-bottom:15px; color:#666;">{{ course['description'] }}</p>
        <p style="margin-bottom:15px;"><strong>Duration:</strong> {{ course['duration'] }}</p>
        <a href="/course/{{ course['id'] }}" class="btn btn-primary">View Course</a>
    </div>
    {% endfor %}
</div>
{% endblock %}
