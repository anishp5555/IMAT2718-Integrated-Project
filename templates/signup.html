{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width:500px; margin:0 auto;">
    <h2 style="margin-bottom:20px; color:#8B0000;">Create an Account</h2>
    <form method="POST">
        <div style="margin-bottom:15px;">
            <label>Full Name</label><br>
            <input type="text" name="full_name" required style="width:100%; padding:10px; margin-top:5px; border:1px solid #ddd; border-radius:5px;">
        </div>
        <div style="margin-bottom:15px;">
            <label>Email Address</label><br>
            <input type="email" name="email" required style="width:100%; padding:10px; margin-top:5px; border:1px solid #ddd; border-radius:5px;">
        </div>
        <div style="margin-bottom:20px;">
            <label>Password</label><br>
            <input type="password" name="password" required style="width:100%; padding:10px; margin-top:5px; border:1px solid #ddd; border-radius:5px;">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Sign Up</button>
    </form>
    <p style="margin-top:15px; text-align:center;">Already have an account? <a href="/login" style="color:#8B0000;">Login</a></p>
</div>
{% endblock %}
